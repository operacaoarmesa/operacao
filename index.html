<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Armesa Logística e Transporte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EDEEE8;--panel:#1E2A33;--paper:#FFFFFF;--ink:#1B2420;--muted:#5C6B63;
    --line:#D8D9D0;--accent:#D9731D;--accent-dark:#A8560F;--accent-tint:#FBE6D2;
    --plate-blue:#1A3FA0;--ok:#3F7D4D;--ok-tint:#E2EFE2;--warn:#C9931B;
    --warn-tint:#FBEFD2;--danger:#C1432E;--danger-tint:#F8E1DC;
    --display:'Space Grotesk',sans-serif;--body:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);}
  .app{max-width:1100px;margin:0 auto;padding:0 0 4rem;}

  .topbar{background:var(--panel);color:#fff;border-radius:0 0 16px 16px;padding:1.5rem 2rem 1.75rem;}
  .brand{display:flex;align-items:baseline;gap:.6rem;}
  .brand-mark{font-family:var(--display);font-weight:600;font-size:1.4rem;}
  .brand-sub{font-family:var(--mono);font-size:.72rem;color:#9FB0BC;letter-spacing:.06em;text-transform:uppercase;}
  .stats{display:flex;gap:1.5rem;margin-top:1.1rem;flex-wrap:wrap;}
  .stat{font-family:var(--mono);font-size:.78rem;color:#C7D2D9;}
  .stat b{font-family:var(--display);font-size:1.15rem;color:#fff;display:block;font-weight:600;}
  .stat.alert b{color:#F2B27A;}

  .tabs{display:flex;gap:.4rem;margin:1.4rem 2rem 0;border-bottom:1px solid var(--line);}
  .tab{font-family:var(--display);font-weight:600;font-size:.92rem;padding:.6rem 1.1rem;background:none;border:none;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;}
  .tab.active{color:var(--ink);border-bottom-color:var(--accent);}
  .tab.tab-alert{color:var(--warn);}
  .tab.tab-alert.active{color:var(--danger);border-bottom-color:var(--danger);}

  .controls{display:flex;gap:.75rem;margin:1.25rem 2rem 1rem;flex-wrap:wrap;align-items:center;}
  .search-wrap{position:relative;flex:1;min-width:220px;}
  .search-wrap input{width:100%;padding:.65rem .9rem .65rem 2.1rem;border-radius:10px;border:1px solid var(--line);font-family:var(--body);font-size:.92rem;background:var(--paper);}
  .search-wrap input:focus{outline:2px solid var(--accent-tint);border-color:var(--accent);}
  .search-icon{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.9rem;}
  .btn{font-family:var(--body);font-weight:600;font-size:.88rem;border-radius:10px;border:1px solid var(--line);background:var(--paper);padding:.65rem 1.1rem;cursor:pointer;color:var(--ink);}
  .btn:hover{border-color:var(--accent);}
  .btn.primary{background:var(--accent);border-color:var(--accent-dark);color:#fff;}
  .btn.primary:hover{background:var(--accent-dark);}
  .btn.primary:disabled{opacity:.6;cursor:not-allowed;}
  .btn.ghost{background:transparent;border-color:transparent;color:var(--muted);}
  .btn.ghost:hover{color:var(--danger);}
  .btn.icon-btn{padding:.65rem .8rem;font-size:1rem;}
  .btn:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--accent);outline-offset:1px;}

  .sort-select{font-family:var(--mono);font-size:.74rem;padding:.35rem .6rem;border-radius:8px;border:1px solid var(--line);background:var(--paper);color:var(--muted);cursor:pointer;}

  .filter-row{display:flex;gap:.4rem;padding:0 2rem 1rem;flex-wrap:wrap;align-items:center;}
  .chip{font-family:var(--mono);font-size:.74rem;padding:.35rem .7rem;border-radius:20px;border:1px solid var(--line);background:var(--paper);cursor:pointer;color:var(--muted);}
  .chip.active{background:var(--panel);color:#fff;border-color:var(--panel);}

  .empty{margin:3rem 2rem;text-align:center;color:var(--muted);font-family:var(--body);}
  .empty i{font-style:normal;font-family:var(--display);font-size:1.05rem;color:var(--ink);display:block;margin-bottom:.3rem;}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:1rem;padding:0 2rem;}
  .load-more{text-align:center;padding:1.5rem 2rem;}

  .card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:1.1rem 1.2rem;border-left:5px solid var(--ok);cursor:pointer;transition:box-shadow .15s;}
  .card:hover{box-shadow:0 2px 12px rgba(0,0,0,.08);}
  .card.status-warn{border-left-color:var(--warn);}
  .card.status-danger{border-left-color:var(--danger);}
  .card.neutral{border-left-color:var(--line);}
  .card.driver-afastado{border-left-color:var(--warn);opacity:.85;}
  .card.driver-desligado{border-left-color:#aaa;opacity:.7;}
  .card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;}
  .item-name{font-family:var(--display);font-weight:600;font-size:1.02rem;margin:0;}
  .item-sub{font-family:var(--mono);font-size:.72rem;color:var(--muted);margin:.15rem 0 0;}
  .pill{font-family:var(--mono);font-size:.68rem;padding:.2rem .55rem;border-radius:20px;white-space:nowrap;background:var(--ok-tint);color:#1F4D29;}
  .status-warn .pill{background:var(--warn-tint);color:#704C09;}
  .status-danger .pill{background:var(--danger-tint);color:#7A2A1C;}
  .pill.type{background:#E7EBF6;color:#2A3C66;}
  .pill.unassigned{background:var(--bg);color:var(--muted);}
  .pill.s-ativo{background:var(--ok-tint);color:#1F4D29;}
  .pill.s-afastado{background:var(--warn-tint);color:#704C09;}
  .pill.s-desligado{background:#F0F0EE;color:#666;}

  .plate{display:inline-block;font-family:var(--mono);font-weight:500;font-size:.82rem;border:1px solid #B9C2D6;border-radius:5px;overflow:hidden;line-height:1;margin:.7rem 0 .6rem;}
  .plate-top{background:var(--plate-blue);color:#fff;font-size:.6rem;padding:.2rem .45rem;letter-spacing:.08em;}
  .plate-body{padding:.32rem .55rem;background:#fff;letter-spacing:.04em;}

  .card-meta{font-size:.8rem;color:var(--muted);display:flex;flex-direction:column;gap:.2rem;}
  .card-meta span b{color:var(--ink);font-weight:500;}
  .obs-tag{font-size:.7rem;background:#FFF8E1;color:#7A5C00;border-radius:4px;padding:.1rem .35rem;display:inline-block;margin-top:.2rem;}

  /* Alert tab */
  .alert-section{padding:1.2rem 2rem 0;}
  .alert-section-title{font-family:var(--mono);font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:0 0 .6rem;padding-bottom:.3rem;border-bottom:1px solid var(--line);}
  .alert-section-title.red{color:var(--danger);}
  .alert-section-title.orange{color:var(--warn);}
  .alert-row{display:flex;align-items:center;gap:.8rem;padding:.55rem .8rem;background:var(--paper);border-radius:10px;margin-bottom:.4rem;cursor:pointer;border:1px solid var(--line);transition:box-shadow .12s;}
  .alert-row:hover{box-shadow:0 1px 8px rgba(0,0,0,.07);}
  .alert-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .alert-dot.red{background:var(--danger);}
  .alert-dot.orange{background:var(--warn);}
  .alert-dot.gray{background:#aaa;}
  .alert-name{font-family:var(--display);font-weight:600;font-size:.9rem;flex:1;}
  .alert-detail{font-family:var(--mono);font-size:.72rem;color:var(--muted);}
  .alert-badge{font-family:var(--mono);font-size:.68rem;padding:.15rem .5rem;border-radius:20px;}
  .alert-badge.red{background:var(--danger-tint);color:#7A2A1C;}
  .alert-badge.orange{background:var(--warn-tint);color:#704C09;}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(20,24,22,.45);display:flex;align-items:flex-start;justify-content:center;padding:3vh 1rem;overflow-y:auto;z-index:50;}
  .modal{background:var(--paper);border-radius:16px;max-width:680px;width:100%;padding:1.75rem 2rem 2rem;margin-bottom:2rem;}
  .modal h2{font-family:var(--display);font-weight:600;font-size:1.2rem;margin:0 0 .2rem;}
  .modal .sub{font-family:var(--mono);font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:0 0 1.3rem;}
  .modal-close{float:right;background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--muted);line-height:1;}
  .section-label{font-family:var(--mono);font-size:.7rem;text-transform:uppercase;letter-spacing:.07em;color:var(--accent-dark);margin:1.3rem 0 .6rem;border-bottom:1px solid var(--line);padding-bottom:.35rem;}
  .section-label:first-of-type{margin-top:0;}
  .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem .9rem;}
  .field label{display:block;font-size:.74rem;color:var(--muted);margin-bottom:.25rem;}
  .field input,.field select,.field textarea{width:100%;padding:.5rem .65rem;border-radius:8px;border:1px solid var(--line);font-family:var(--body);font-size:.88rem;background:var(--paper);}
  .field textarea{min-height:64px;resize:vertical;}
  .field input[data-mono="1"]{font-family:var(--mono);}
  .veiculo-row{display:flex;align-items:center;gap:.6rem;padding:.45rem .6rem;background:var(--bg);border-radius:8px;cursor:pointer;transition:background .12s;}
  .veiculo-row:hover{background:var(--line);}
  .cnh-badge{margin-top:.3rem;min-height:1.4rem;}
  .history-item{display:flex;justify-content:space-between;font-size:.78rem;padding:.3rem 0;border-bottom:1px solid var(--line);}
  .history-item:last-child{border-bottom:none;}
  .modal-actions{display:flex;justify-content:space-between;align-items:center;margin-top:1.6rem;padding-top:1rem;border-top:1px solid var(--line);}

  .csv-modal{position:fixed;inset:0;background:rgba(20,24,22,.55);display:flex;align-items:center;justify-content:center;padding:2vh 1rem;z-index:100;}
  .csv-box{background:var(--paper);border-radius:16px;max-width:720px;width:100%;padding:1.5rem 1.75rem;display:flex;flex-direction:column;gap:.9rem;max-height:90vh;}
  .csv-box h3{font-family:var(--display);font-weight:600;font-size:1.05rem;margin:0;}
  .csv-box textarea{width:100%;flex:1;min-height:260px;font-family:var(--mono);font-size:.72rem;border:1px solid var(--line);border-radius:8px;padding:.6rem .75rem;resize:none;background:#FAFAF8;}
  .csv-actions{display:flex;gap:.6rem;justify-content:flex-end;}
  /* ── Security screens ── */
  .sec-screen{position:fixed;inset:0;background:var(--panel);display:flex;align-items:center;justify-content:center;padding:1rem;z-index:200;}
  .sec-box{background:var(--paper);border-radius:20px;padding:2.5rem 2rem 2rem;max-width:360px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.35);}
  .sec-icon{font-size:2.2rem;margin-bottom:.6rem;}
  .sec-title{font-family:var(--display);font-weight:600;font-size:1.3rem;margin:0 0 .2rem;}
  .sec-sub{font-family:var(--mono);font-size:.72rem;color:var(--muted);letter-spacing:.05em;margin:0 0 1.8rem;}
  .sec-input{width:100%;padding:.75rem 1rem;border-radius:10px;border:1.5px solid var(--line);font-family:var(--body);font-size:1rem;margin-bottom:.6rem;text-align:center;letter-spacing:.15em;}
  .sec-input:focus{outline:none;border-color:var(--accent);}
  .sec-btn{width:100%;padding:.75rem;border-radius:10px;border:none;background:var(--accent);color:#fff;font-family:var(--display);font-weight:600;font-size:1rem;cursor:pointer;margin-top:.3rem;}
  .sec-btn:hover{background:var(--accent-dark);}
  .sec-btn:disabled{opacity:.5;cursor:not-allowed;}
  .sec-error{font-family:var(--mono);font-size:.74rem;color:var(--danger);min-height:1.1rem;margin:.3rem 0;}
  .sec-link{font-size:.78rem;color:var(--muted);cursor:pointer;margin-top:1.1rem;display:block;text-decoration:underline;}
  .sec-link:hover{color:var(--danger);}
  .sec-hint{font-size:.74rem;color:var(--muted);margin:.5rem 0 0;}
  /* ── Topbar security buttons ── */
  .topbar-sec{display:flex;gap:.4rem;margin-left:auto;}
  .topbar-btn{background:rgba(255,255,255,.1);border:none;border-radius:8px;color:#C7D2D9;font-size:.85rem;padding:.35rem .6rem;cursor:pointer;font-family:var(--mono);}
  .topbar-btn:hover{background:rgba(255,255,255,.2);color:#fff;}
  .topbar-btn.active{background:var(--accent);color:#fff;}
  /* ── Privacy masking ── */
  .masked{letter-spacing:.08em;color:var(--muted);}
  /* ── Lock timer bar ── */
  .lock-bar{height:3px;background:var(--accent);transition:width linear;position:absolute;bottom:0;left:0;}
  .topbar{position:relative;overflow:hidden;}
  .loading{padding:3rem 2rem;text-align:center;color:var(--muted);font-family:var(--mono);font-size:.8rem;}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}
  @media(max-width:560px){
    .fgrid{grid-template-columns:1fr;}
    .topbar{padding:1.25rem 1.25rem 1.5rem;}
    .controls,.filter-row,.grid,.tabs,.load-more,.alert-section{padding-left:1.25rem;padding-right:1.25rem;}
  }

  /* ─── Operação: Acompanhamento de Contêiner ─────────────────────────── */
  .op-module{max-width:640px;margin:1.2rem auto;padding:0 2rem 3rem;}
  .op-summary{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:.78rem;color:var(--muted);padding:.5rem 0 1rem;border-bottom:1px solid var(--line);margin-bottom:1.1rem;}
  .op-summary b{color:var(--ok);font-size:.95rem;}
  .op-card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:1.1rem 1.2rem;margin-bottom:.85rem;}
  .op-card-title{font-family:var(--display);font-weight:600;font-size:.88rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:0 0 .8rem;}
  .op-field{display:flex;flex-direction:column;gap:.25rem;margin-bottom:.65rem;}
  .op-field:last-child{margin-bottom:0;}
  .op-field label{font-size:.74rem;color:var(--muted);}
  .op-field input,.op-field textarea,.op-field select{padding:.5rem .65rem;border-radius:8px;border:1px solid var(--line);font-family:var(--body);font-size:.88rem;background:var(--paper);width:100%;}
  .op-field textarea{min-height:68px;resize:vertical;}
  .op-row2{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;}
  /* stages */
  .op-stage{background:var(--paper);border:1px solid var(--line);border-radius:12px;margin-bottom:.6rem;overflow:hidden;transition:border-color .15s;}
  .op-stage.is-done{border-color:var(--ok);border-left:4px solid var(--ok);}
  .op-stage.is-pending{border-color:var(--warn);border-left:4px solid var(--warn);}
  .op-stage-head{display:flex;align-items:center;gap:.75rem;padding:.85rem 1rem;cursor:pointer;user-select:none;}
  .op-stage-head:hover{background:var(--bg);}
  .op-stage-dot{width:11px;height:11px;border-radius:50%;background:var(--line);flex-shrink:0;}
  .op-stage.is-done .op-stage-dot{background:var(--ok);}
  .op-stage.is-pending .op-stage-dot{background:var(--warn);}
  .op-stage-info{flex:1;}
  .op-stage-name{font-family:var(--display);font-weight:600;font-size:.9rem;}
  .op-stage-time{font-family:var(--mono);font-size:.72rem;color:var(--muted);margin-top:.15rem;}
  .op-stage.is-done .op-stage-time{color:var(--ok);}
  .op-stage.is-pending .op-stage-time{color:var(--warn);}
  .op-stage-body{padding:0 1rem;max-height:0;overflow:hidden;transition:max-height .2s ease,padding .2s;}
  .op-stage-body.open{max-height:260px;padding:.75rem 1rem 1rem;}
  .op-pending-toggle{display:flex;align-items:center;gap:.5rem;font-size:.8rem;color:var(--muted);margin-bottom:.65rem;cursor:pointer;}
  .op-pending-toggle input{accent-color:var(--warn);}
  .op-time-controls{display:flex;gap:.5rem;flex-wrap:wrap;}
  .op-time-controls input[type=date],.op-time-controls input[type=time]{flex:1;min-width:120px;padding:.45rem .6rem;border-radius:8px;border:1px solid var(--line);font-family:var(--mono);font-size:.82rem;background:var(--paper);}
  .op-btn-now{padding:.45rem .9rem;border-radius:8px;border:1px solid var(--accent);background:var(--accent-tint);color:var(--accent-dark);font-family:var(--body);font-weight:600;font-size:.82rem;cursor:pointer;white-space:nowrap;}
  .op-btn-now:hover{background:var(--accent);color:#fff;}
  .op-btn-now:disabled{opacity:.4;cursor:not-allowed;}
  .op-extra-field{margin-top:.6rem;}
  .op-extra-field label{font-size:.74rem;color:var(--muted);display:block;margin-bottom:.2rem;}
  .op-extra-field input{width:100%;padding:.45rem .6rem;border-radius:8px;border:1px solid var(--line);font-family:var(--body);font-size:.85rem;background:var(--paper);}
  /* channel send */
  .op-channel{display:flex;flex-direction:column;gap:.1rem;padding:.6rem 0;border-bottom:1px solid var(--line);}
  .op-channel:last-of-type{border-bottom:none;}
  .op-channel-check{display:flex;align-items:center;gap:.5rem;font-size:.88rem;cursor:pointer;}
  .op-channel-check input{accent-color:var(--accent);}
  .op-channel-input{margin-top:.35rem;padding:.45rem .65rem;border-radius:8px;border:1px solid var(--line);font-family:var(--body);font-size:.85rem;width:100%;background:var(--paper);}
  .op-hint{font-size:.75rem;color:var(--muted);margin-top:.3rem;}
  /* search */
  .op-search-row{display:flex;gap:.5rem;margin-bottom:.6rem;}
  .op-search-row input{flex:1;padding:.5rem .7rem;border-radius:8px;border:1px solid var(--line);font-family:var(--body);font-size:.88rem;background:var(--paper);}
  .op-search-row button{padding:.5rem 1rem;border-radius:8px;border:1px solid var(--line);background:var(--paper);font-family:var(--body);font-weight:600;font-size:.85rem;cursor:pointer;}
  .op-search-row button:hover{border-color:var(--accent);}
  .op-result-item{padding:.55rem .7rem;border-radius:8px;border:1px solid var(--line);margin-bottom:.35rem;cursor:pointer;background:var(--paper);}
  .op-result-item:hover{background:var(--bg);}
  .op-res-title{font-family:var(--display);font-weight:600;font-size:.88rem;}
  .op-res-sub{font-family:var(--mono);font-size:.72rem;color:var(--muted);margin-top:.15rem;}
  .op-search-empty{font-size:.82rem;color:var(--muted);text-align:center;padding:.75rem 0;}
  /* send button */
  .op-btn-send{width:100%;padding:.85rem;border-radius:12px;border:none;background:var(--accent);color:#fff;font-family:var(--display);font-weight:600;font-size:1rem;cursor:pointer;margin-top:.5rem;}
  .op-btn-send:hover{background:var(--accent-dark);}
  .op-reset{text-align:center;font-size:.78rem;color:var(--muted);margin-top:1rem;cursor:pointer;text-decoration:underline;}
  .op-reset:hover{color:var(--danger);}
  /* toast */
  .op-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--ink);color:#fff;font-family:var(--mono);font-size:.8rem;padding:.55rem 1.1rem;border-radius:20px;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:300;}
  .op-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  @media(max-width:560px){.op-module{padding:0 1rem 3rem;}.op-row2{grid-template-columns:1fr;}}

</style>
</head>
<body>
<h1 class="sr-only">Armesa Logística e Transporte — Gestão de Frota e Operações</h1>
<div class="app" id="app"><div class="loading">Carregando cadastro…</div></div>
<script>
// ─── Constantes ──────────────────────────────────────────────────────────────
const M_PREFIX = 'motorista:';
const V_PREFIX = 'veiculo:';
const PAGE_SIZE = 24;
const CNH_CATEGORIAS = ['A','B','C','D','E','AB','AC','AD','AE'];
const TIPO_LABELS = {cavalo:'Cavalo',reboque:'Reboque',semireboque:'Semi-reboque',caminhao:'Caminhão (carga simples)'};
const SITUACAO_LABELS = {ativo:'Ativo',afastado:'Afastado',desligado:'Desligado'};

// ─── Estado ───────────────────────────────────────────────────────────────────
let motoristas=[], veiculos=[];
let activeTab='operacao';
let searchTerm='', activeFilter='all';
let editingMotoristaId=null, editingVeiculoId=null;
let motoristaUnlocked=false, veiculoUnlocked=false;
let currentPage=1, isSaving=false;
let lastLoadError=null, loadErrors=[];
let searchDebounceTimer=null;
let sortM='nome', sortV='placa';

// ─── Segurança ────────────────────────────────────────────────────────────────
let isLocked = true;
let isSetup  = false;
let privacyMode = false;
let lockTimerId = null;
const LOCK_MS   = 10 * 60 * 1000; // 10 minutos
const SEC_KEY   = 'app:sec:hash';  // shared=false → por usuário

// ─── Utilitários ──────────────────────────────────────────────────────────────
function uid(){ return 'r'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

function daysUntil(dateStr){
  if(!dateStr) return null;
  const today=new Date(); today.setHours(0,0,0,0);
  return Math.round((new Date(dateStr+'T00:00:00')-today)/86400000);
}

function cnhStatus(dateStr){
  const d=daysUntil(dateStr);
  if(d===null) return {cls:'',label:'Sem data',d:null};
  if(d<0)      return {cls:'status-danger',label:'Vencida há '+Math.abs(d)+'d',d};
  if(d<=30)    return {cls:'status-danger',label:'Vence em '+d+'d',d};
  if(d<=60)    return {cls:'status-warn',label:'Vence em '+d+'d',d};
  return {cls:'',label:'Em dia ('+d+'d)',d};
}

function crlvStatus(dateStr){
  const d=daysUntil(dateStr);
  if(d===null) return {cls:'',label:'',d:null};
  if(d<0)   return {cls:'status-danger',label:'CRLV vencido há '+Math.abs(d)+'d',d};
  if(d<=30) return {cls:'status-danger',label:'CRLV vence em '+d+'d',d};
  if(d<=60) return {cls:'status-warn',label:'CRLV vence em '+d+'d',d};
  return {cls:'',label:'',d};
}

function calcAge(dateStr){
  if(!dateStr) return null;
  const b=new Date(dateStr+'T00:00:00'), t=new Date();
  let age=t.getFullYear()-b.getFullYear();
  const m=t.getMonth()-b.getMonth();
  if(m<0||(m===0&&t.getDate()<b.getDate())) age--;
  return age;
}

function fmtDate(s){
  if(!s) return '—';
  const [y,m,d]=s.split('-'); return d+'/'+m+'/'+y;
}

function esc(s){
  return (s===undefined||s===null)?'':String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

function normalizePlaca(p){ return (p||'').toUpperCase().replace(/[^A-Z0-9]/g,''); }

function formatPlaca(p){
  const n=normalizePlaca(p);
  if(n.length===7){
    if(/^[A-Z]{3}[0-9][A-Z][0-9]{2}$/.test(n)) return n;
    if(/^[A-Z]{3}[0-9]{4}$/.test(n)) return n.slice(0,3)+'-'+n.slice(3);
  }
  return n;
}

function cnhBadgeHtml(motoristaId){
  if(!motoristaId) return '';
  const m=motoristas.find(x=>x.id===motoristaId);
  if(!m) return '';
  const s=cnhStatus(m.cnhVencimento);
  const bg=s.cls==='status-danger'?'var(--danger-tint)':s.cls==='status-warn'?'var(--warn-tint)':'var(--ok-tint)';
  const fg=s.cls==='status-danger'?'#7A2A1C':s.cls==='status-warn'?'#704C09':'#1F4D29';
  return `<span style="font-family:var(--mono);font-size:.72rem;padding:.2rem .55rem;border-radius:20px;background:${bg};color:${fg};">CNH ${s.label}</span>`;
}

// ─── Mascaramento ────────────────────────────────────────────────────────────
function maskVal(val){
  if(!privacyMode||!val) return esc(val);
  const s=String(val).trim();
  if(!s||s==='—') return s;
  return '<span class="masked">'+s.replace(/[0-9A-Za-z]/g,'•')+'</span>';
}

// ─── Segurança ────────────────────────────────────────────────────────────────
async function hashPwd(pwd){
  try{
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pwd+':frota_v1'));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }catch(e){
    // Fallback simples caso crypto.subtle não esteja disponível
    let h=0;
    const s=pwd+':frota_v1';
    for(let i=0;i<s.length;i++){ h=Math.imul(31,h)+s.charCodeAt(i)|0; }
    return 'fb_'+(h>>>0).toString(16).padStart(8,'0')+'_'+btoa(s).replace(/[^a-z0-9]/gi,'').slice(0,24);
  }
}
async function getStoredHash(){ try{ const r=await window.storage.get(SEC_KEY,true); return r?r.value:null; }catch(e){ return null; } }
async function setStoredHash(h){ await window.storage.set(SEC_KEY,h,true); }
async function clearStoredHash(){ try{ await window.storage.delete(SEC_KEY,true); }catch(e){} }

function startLockTimer(){
  clearTimeout(lockTimerId);

}

// ─── Storage ──────────────────────────────────────────────────────────────────
async function storageGetWithRetry(key,shared,maxTries){
  maxTries=maxTries||3; let lastErr;
  for(let i=0;i<maxTries;i++){
    try{ return await window.storage.get(key,shared); }
    catch(e){ lastErr=e; if(i<maxTries-1) await new Promise(r=>setTimeout(r,300*(i+1))); }
  }
  throw lastErr;
}

async function loadAll(){
  lastLoadError=null; loadErrors=[];
  try{
    if(!window.storage) throw new Error('window.storage indisponível.');
    const [mi,vi]=await Promise.all([window.storage.list(M_PREFIX,true),window.storage.list(V_PREFIX,true)]);
    const mKeys=(mi&&mi.keys)||[], vKeys=(vi&&vi.keys)||[];
    const mOut=[];
    for(const k of mKeys){
      try{ const r=await storageGetWithRetry(k,true); if(r&&r.value) mOut.push(JSON.parse(r.value)); }
      catch(e){ console.error('Falha ao ler',k,e); loadErrors.push(k); }
    }
    const vOut=[];
    for(const k of vKeys){
      try{ const r=await storageGetWithRetry(k,true); if(r&&r.value) vOut.push(JSON.parse(r.value)); }
      catch(e){ console.error('Falha ao ler',k,e); loadErrors.push(k); }
    }
    mOut.sort((a,b)=>(a.nome||'').localeCompare(b.nome||''));
    vOut.sort((a,b)=>(a.placa||'').localeCompare(b.placa||''));
    motoristas=mOut; veiculos=vOut;
  }catch(e){
    console.error('loadAll falhou:',e);
    lastLoadError=(e&&e.message)?e.message:String(e);
    motoristas=[]; veiculos=[];
  }
  render();
}

// ─── Exportar CSV ─────────────────────────────────────────────────────────────
function buildCSV(type){
  let headers, rows;
  if(type==='motoristas'){
    headers=['Nome','CPF','RG','Nascimento','Idade','Situacao','CNH','Categoria','Expedicao CNH','Vencimento CNH','ANTT','Telefone','Observacoes'];
    rows=motoristas.map(m=>[
      m.nome,m.cpf,m.rg,fmtDate(m.dataNascimento),calcAge(m.dataNascimento)||'',
      SITUACAO_LABELS[m.situacao||'ativo'],m.cnhNumero,m.cnhCategoria,
      fmtDate(m.cnhExpedicao),fmtDate(m.cnhVencimento),m.antt||'',m.telefone||'',m.observacoes||''
    ]);
  } else {
    headers=['Placa','Tipo','Modelo','Renavam','Chassi','Ano','Exercicio','Venc.CRLV','Cor','ANTT','Titular ANTT','CPF/CNPJ ANTT','Proprietario','CPF/CNPJ Prop.','Motorista Atual','Observacoes'];
    rows=veiculos.map(v=>{
      const drv=motoristas.find(m=>m.id===v.motoristaAtualId);
      return [formatPlaca(v.placa),TIPO_LABELS[v.tipo]||v.tipo,v.marcaModelo||'',v.renavam||'',v.chassi||'',
        v.ano||'',v.exercicio||'',fmtDate(v.crlvVencimento),v.cor||'',v.antt||'',v.anttNome||'',v.anttDoc||'',
        v.proprietario||'',v.proprietarioDoc||'',drv?drv.nome:'',v.observacoes||''];
    });
  }
  return [headers,...rows].map(r=>r.map(c=>'"'+String(c||'').replace(/"/g,'""')+'"').join(',')).join('\n');
}

function doExportCSV(type){
  const csv=buildCSV(type);
  const title=type==='motoristas'?`Motoristas (${motoristas.length} registros)`:`Veículos (${veiculos.length} registros)`;
  const overlay=document.createElement('div');
  overlay.className='csv-modal';
  overlay.id='csv-overlay';
  overlay.innerHTML=`
    <div class="csv-box">
      <h3>📋 Exportar CSV — ${title}</h3>
      <p style="font-size:.8rem;color:var(--muted);margin:0;">Clique em <b>Selecionar tudo</b> e copie (Ctrl+C / Cmd+C). Cole em um editor de texto e salve como <b>${type}.csv</b>.</p>
      <textarea id="csv-content" readonly onclick="this.select()">${csv}</textarea>

        <button class="btn primary" onclick="document.getElementById('csv-overlay').remove();">Fechar</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

}

App.tryUnlock=async function(){
  const input=document.getElementById('pwd-input');
  const errEl=document.getElementById('pwd-error');
  const btn=document.getElementById('pwd-btn');
  if(!input||!errEl) return;
  const val=input.value;
  if(!val){ errEl.textContent='Digite a senha.'; return; }
  btn.disabled=true; btn.textContent='Verificando…';
  try{
    const hash=await hashPwd(val);
    const stored=await getStoredHash();
    if(!stored){
      // Nenhuma senha cadastrada — vai para setup
      isSetup=true; isLocked=false; render(); return;
    }
    if(hash===stored){
      isLocked=false; startLockTimer(); render();
    } else {
      errEl.textContent='Senha incorreta. Tente novamente.';
      input.value=''; input.focus();
      btn.disabled=false; btn.textContent='Entrar';
    }
  }catch(e){
    errEl.textContent='Erro ao verificar senha. Tente novamente.';
    btn.disabled=false; btn.textContent='Entrar';
    console.error('tryUnlock error:',e);
  }
};

App.trySetup=async function(){
  const p1=document.getElementById('pwd-new');
  const p2=document.getElementById('pwd-confirm');
  const errEl=document.getElementById('pwd-error');
  const btn=document.getElementById('pwd-btn');
  if(!p1||!p2||!errEl) return;
  if(p1.value.length<4){ errEl.textContent='Mínimo 4 caracteres.'; return; }
  if(p1.value!==p2.value){ errEl.textContent='As senhas não coincidem.'; return; }
  btn.disabled=true; btn.textContent='Salvando…';
  const hash=await hashPwd(p1.value);
  await setStoredHash(hash);
  isSetup=false; isLocked=false; startLockTimer(); render();
};

  const errEl=document.getElementById('cp-error');

  if(oldHash!==stored){ errEl.textContent='Senha atual incorreta.'; btn.disabled=false; btn.textContent='Salvar nova senha'; return; }

  const entry={
    id:Date.now(), savedAt:new Date().toISOString(),
    driverName:opState.driverName, plateCavalo:opState.plateCavalo,
    plateReboque:opState.plateReboque, containerNum:opState.containerNum,
    refNum:opState.refNum, operMsg:opState.operMsg,
    stages:JSON.parse(JSON.stringify(opState.stages))
  };
  try{
    // Remove entries with same container/ref
    const all=await opLoadHistory();
    for(const h of all){
      if((h.containerNum&&h.containerNum===entry.containerNum)||(h.refNum&&h.refNum===entry.refNum)){
        try{ await window.storage.delete(OP_HIST_PFX+h.id,false); }catch(e){}
      }
    }
    await window.storage.set(OP_HIST_PFX+entry.id,JSON.stringify(entry),false);
    // Keep max 200
    const updated=await opLoadHistory();
    if(updated.length>200){
      for(const old of updated.slice(200)){
        try{ await window.storage.delete(OP_HIST_PFX+old.id,false); }catch(e){}
      }
    }
  }catch(e){}
}

// ── Limpeza automática por expiração ─────────────────────────────────────────
async function opCleanExpiredHistory(){
  try{
    const keys=(await window.storage.list(OP_HIST_PFX,false))?.keys||[];
    const cutoff=Date.now()-(OP_HISTORY_DAYS*24*60*60*1000);
    let removed=0;
    for(const k of keys){
      try{
        const r=await window.storage.get(k,false);
        if(r&&r.value){
          const entry=JSON.parse(r.value);
          const savedAt=entry.savedAt?new Date(entry.savedAt).getTime():0;
          if(savedAt<cutoff){
            await window.storage.delete(k,false);
            removed++;
          }
        }
      }catch(e){}
    }
    if(removed>0) console.log(`Operação: ${removed} entrada(s) expirada(s) removida(s)`);
  }catch(e){}
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function opNowHM(){ const d=new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function opTodayYMD(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function opFmtDate(ymd){ if(!ymd) return ''; const p=ymd.split('-'); return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:ymd; }
function opShowToast(msg){ const t=document.getElementById('op-toast'); if(!t) return; t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400); }

// ── Render ─────────────────────────────────────────────────────────────────────
function opRender(){
  const g=id=>document.getElementById(id);
  if(!g('op-driverName')) return;
  g('op-driverName').value=opState.driverName||'';
  g('op-plateCavalo').value=opState.plateCavalo||'';
  g('op-plateReboque').value=opState.plateReboque||'';
  g('op-containerNum').value=opState.containerNum||'';
  g('op-refNum').value=opState.refNum||'';
  g('op-operMsg').value=opState.operMsg||'';
  g('op-destEmail').value=opState.destEmail||'';

  const cont=g('op-stagesContainer');
  cont.innerHTML='';
  let doneCount=0;

  OP_STAGES.forEach((stageDef,idx)=>{
    const st=opState.stages[stageDef.key];
    const isFilled=st.time&&st.date;
    if(isFilled) doneCount++;
    const isOpen=opState.openStage===stageDef.key;

    let timeDisplay;
    if(st.pending) timeDisplay='A confirmar';
    else if(isFilled) timeDisplay=opFmtDate(st.date)+' às '+st.time;
    else if(st.date||st.time) timeDisplay='Incompleto (falta data ou horário)';
    else timeDisplay='Pendente';

    let extraHtml='';
    if(stageDef.extra){
      stageDef.extra.forEach(ex=>{
        extraHtml+=`<div class="op-extra-field"><label>${esc(ex.label)}</label><input type="text" data-extra-key="${ex.key}" data-stage="${stageDef.key}" value="${esc(st.extra[ex.key]||'')}" placeholder="Ex: Terminal Santos Brasil"></div>`;
      });
    }

    const el=document.createElement('div');
    el.className='op-stage'+(isFilled?' is-done':st.pending?' is-pending':'');
    el.innerHTML=`
      <div class="op-stage-head" data-stagekey="${stageDef.key}">
        <div class="op-stage-dot"></div>
        <div class="op-stage-info">
          <div class="op-stage-name">${idx+1}. ${esc(stageDef.label)}</div>
          <div class="op-stage-time">${timeDisplay}</div>
        </div>
        <span style="font-family:var(--mono);font-size:.75rem;color:var(--muted);">${isOpen?'▲':'▼'}</span>
      </div>
      <div class="op-stage-body${isOpen?' open':''}">
        <label class="op-pending-toggle">
          <input type="checkbox" data-stage="${stageDef.key}" class="op-pending-chk" ${st.pending?'checked':''}>&nbsp;Horário ainda não definido ("A confirmar")
        </label>
        <div class="op-time-controls">
          <input type="date" data-stage="${stageDef.key}" class="op-date-inp" value="${st.date||''}" ${st.pending?'disabled':''}>
          <input type="time" data-stage="${stageDef.key}" class="op-time-inp" value="${st.time||''}" ${st.pending?'disabled':''}>
          <button type="button" class="op-btn-now" data-stage="${stageDef.key}" ${st.pending?'disabled':''}>Agora</button>
        </div>
        ${extraHtml}
      </div>`;
    cont.appendChild(el);
  });

  const dc=g('op-doneCount');
  if(dc) dc.textContent=doneCount;
  opAttachStageEvents();
}

function opAttachStageEvents(){
  document.querySelectorAll('.op-stage-head').forEach(h=>{
    h.onclick=()=>{
      const k=h.dataset.stagekey;
      opState.openStage=(opState.openStage===k?null:k);
      opSaveState(); opRender();
    };
  });
  document.querySelectorAll('.op-pending-chk').forEach(chk=>{
    chk.onchange=(e)=>{
      const k=e.target.dataset.stage;
      opState.stages[k].pending=e.target.checked;
      if(e.target.checked){ opState.stages[k].date=''; opState.stages[k].time=''; }
      opSaveState(); opRender();
      opState.openStage=k; opSaveState();
    };
  });
  document.querySelectorAll('.op-date-inp').forEach(inp=>{
    inp.onchange=(e)=>{ opState.stages[e.target.dataset.stage].date=e.target.value; opSaveState(); opRender(); opState.openStage=e.target.dataset.stage; opSaveState(); };
  });
  document.querySelectorAll('.op-time-inp').forEach(inp=>{
    inp.onchange=(e)=>{ opState.stages[e.target.dataset.stage].time=e.target.value; opSaveState(); opRender(); opState.openStage=e.target.dataset.stage; opSaveState(); };
  });
  document.querySelectorAll('.op-btn-now').forEach(btn=>{
    btn.onclick=(e)=>{
      const k=e.target.dataset.stage;
      opState.stages[k].time=opNowHM(); opState.stages[k].date=opTodayYMD();
      opSaveState(); opRender(); opState.openStage=k; opSaveState();
    };
  });
  document.querySelectorAll('[data-extra-key]').forEach(inp=>{
    inp.onchange=(e)=>{ opState.stages[e.target.dataset.stage].extra[e.target.dataset.extraKey]=e.target.value; opSaveState(); };
  });
}

function opUpperAlnum(val){ return val.toUpperCase().replace(/[^A-Z0-9]/g,''); }

function opApplyUpperAlnum(id,stateKey){
  const el=document.getElementById(id);
  if(!el) return;
  el.addEventListener('input',()=>{
    const cur=el.selectionStart;
    el.value=opUpperAlnum(el.value);
    el.setSelectionRange(cur,cur);
    opState[stateKey]=el.value;
    opSaveState();
  });
}

function opAttachGeneralEvents(){
  const g=id=>document.getElementById(id);
  const dn=g('op-driverName'); if(dn) dn.oninput=(e)=>{ opState.driverName=e.target.value; opSaveState(); };
  opApplyUpperAlnum('op-plateCavalo','plateCavalo');
  opApplyUpperAlnum('op-plateReboque','plateReboque');
  opApplyUpperAlnum('op-containerNum','containerNum');
  opApplyUpperAlnum('op-refNum','refNum');
  const om=g('op-operMsg'); if(om) om.oninput=(e)=>{ opState.operMsg=e.target.value; opSaveState(); };
  const de=g('op-destEmail'); if(de) de.oninput=(e)=>{ opState.destEmail=e.target.value; opSaveState(); };

  const sbtn=g('op-searchBtn');
  if(sbtn) sbtn.onclick=async()=>{
    const q=g('op-searchQuery').value;
    const cont=g('op-searchResults');
    if(!q.trim()){ cont.innerHTML='<div class="op-search-empty">Digite o número do contêiner ou referência.</div>'; return; }
    const ql=q.trim().toLowerCase();
    const all=await opLoadHistory();
    const results=all.filter(h=>(h.containerNum&&h.containerNum.toLowerCase().includes(ql))||(h.refNum&&h.refNum.toLowerCase().includes(ql)));
    cont.innerHTML='';
    if(!results.length){ cont.innerHTML='<div class="op-search-empty">Nenhuma operação encontrada.</div>'; return; }
    results.forEach(entry=>{
      const div=document.createElement('div');
      div.className='op-result-item';
      const date=entry.savedAt?new Date(entry.savedAt).toLocaleDateString('pt-BR'):'';
      div.innerHTML=`<div class="op-res-title">📦 ${esc(entry.containerNum||'—')} &nbsp;·&nbsp; Ref: ${esc(entry.refNum||'—')}</div><div class="op-res-sub">${esc(entry.driverName||'—')} &nbsp;·&nbsp; ${esc(entry.plateCavalo||'—')} / ${esc(entry.plateReboque||'—')} &nbsp;·&nbsp; ${date}</div>`;
      div.onclick=()=>{
        opState.driverName=entry.driverName||''; opState.plateCavalo=entry.plateCavalo||'';
        opState.plateReboque=entry.plateReboque||''; opState.containerNum=entry.containerNum||'';
        opState.refNum=entry.refNum||''; opState.operMsg=entry.operMsg||'';
        OP_STAGES.forEach(s=>{ opState.stages[s.key]=(entry.stages&&entry.stages[s.key])?entry.stages[s.key]:{date:'',time:'',pending:false,sent:false,extra:{}}; });
        opState.openStage=null;
        opSaveState(); opRender();
        g('op-searchResults').innerHTML=''; g('op-searchQuery').value='';
        opShowToast('Operação carregada com todos os dados');
      };
      cont.appendChild(div);
    });
  };

  const sq=g('op-searchQuery');
  if(sq) sq.onkeydown=(e)=>{ if(e.key==='Enter') g('op-searchBtn')?.click(); };

  const rl=g('op-resetLink');
  if(rl) rl.onclick=()=>{
    if(!confirm('Apagar todos os dados da operação atual?')) return;
    opState={ driverName:'',plateCavalo:'',plateReboque:'',containerNum:'',refNum:'',operMsg:'',destEmail:'',stages:opBlankStages(),openStage:null };
    opSaveState(); opRender(); opShowToast('Dados limpos');
  };

  const sf=g('op-btnSend');
  if(sf) sf.onclick=opSendUpdate;
}

function opBuildMessagePlain(){
  const lines=[];
  if(opState.operMsg&&opState.operMsg.trim()){ lines.push(opState.operMsg.trim()); lines.push(''); }
  lines.push('Motorista/Funcionário: '+(opState.driverName||'-'));
  lines.push('Placa cavalo: '+(opState.plateCavalo||'-'));
  lines.push('Placa reboque: '+(opState.plateReboque||'-'));
  lines.push('Contêiner: '+(opState.containerNum||'-'));
  lines.push('Referência: '+(opState.refNum||'-'));
  lines.push('');
  OP_STAGES.forEach(stageDef=>{
    const st=opState.stages[stageDef.key];
    if(st.pending){ lines.push(stageDef.label+': A confirmar'); }
    else if(st.time&&st.date){
      lines.push(stageDef.label+': '+opFmtDate(st.date)+' às '+st.time);
      if(stageDef.extra) stageDef.extra.forEach(ex=>{ if(st.extra[ex.key]) lines.push('  '+ex.label+': '+st.extra[ex.key]); });
    }
  });
  return lines.join('\n');
}

function opBuildMessageHTML(){
  const e=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const sty='font-family:Arial,sans-serif;font-size:12pt;line-height:1.15;color:#000000;';
  const row=(label,value)=>`<tr><td style="padding:3px 0"><b>${label}:</b> ${e(value)}</td></tr>`;
  let rows=row('Motorista/Funcionário',opState.driverName||'-')+row('Placa cavalo',opState.plateCavalo||'-')+row('Placa reboque',opState.plateReboque||'-')+row('Contêiner',opState.containerNum||'-')+row('Referência',opState.refNum||'-');
  let stageRows='';
  OP_STAGES.forEach(stageDef=>{
    const st=opState.stages[stageDef.key];
    if(st.pending){ stageRows+=row(stageDef.label,'A confirmar'); }
    else if(st.time&&st.date){
      stageRows+=row(stageDef.label,opFmtDate(st.date)+' às '+st.time);
      if(stageDef.extra) stageDef.extra.forEach(ex=>{ if(st.extra[ex.key]) stageRows+=row(ex.label,st.extra[ex.key]); });
    }
  });
  const msgBlock=(opState.operMsg&&opState.operMsg.trim())?`<p style="${sty}margin:0 0 14px 0;">${e(opState.operMsg.trim()).replace(/\n/g,'<br>')}</p>`:'';
  return `<div style="${sty}">${msgBlock}<table style="border-collapse:collapse;${sty}">${rows}</table>${stageRows?`<br><table style="border-collapse:collapse;${sty}">${stageRows}</table>`:''}</div>`;
}

function opSendUpdate(){
  const useEmail=document.getElementById('op-useEmail')?.checked;
  const useWhats=document.getElementById('op-useWhats')?.checked;
  const email=(opState.destEmail||'').trim();
  if(!useEmail&&!useWhats){ opShowToast('Selecione ao menos um canal de envio'); return; }
  if(useEmail&&!email){ opShowToast('Preencha o e-mail de destino'); document.getElementById('op-destEmail')?.focus(); return; }
  const subject=`Atualização contêiner ${opState.containerNum||''} — Ref: ${opState.refNum||''}`;
  if(useEmail){
    const htmlBody=opBuildMessageHTML();
    window.open(`https://webmail-seguro.com.br/?_task=mail&_action=compose&_to=${encodeURIComponent(email)}&_subject=${encodeURIComponent(subject)}&_body=${encodeURIComponent(htmlBody)}`,'_blank');
  }
  if(useWhats){
    const plainText=opBuildMessagePlain();
    setTimeout(()=>{ window.location.href=`whatsapp://send?text=${encodeURIComponent(plainText)}`; },useEmail?400:0);
  }
  OP_STAGES.forEach(s=>{ opState.stages[s.key].sent=true; });
  opSaveToHistory(); opSaveState(); opRender();
  opShowToast('Enviado com sucesso!');
}

      <button class="tab ${activeTab==='operacao'?'active':''}" onclick="App.setTab('operacao')">📦 Operação</button>
      <button class="tab ${activeTab==='motoristas'?'active':''}" onclick="App.setTab('motoristas')">Motoristas</button>
      <button class="tab ${activeTab==='veiculos'?'active':''}" onclick="App.setTab('veiculos')">Veículos</button>
      <button class="tab tab-alert ${activeTab==='alertas'?'active':''}" onclick="App.setTab('alertas')">${alertTabLabel}</button>
    </div>
    <div id="tab-body"></div>
    <div id="modal-slot"></div>
  `;

  if(activeTab==='motoristas') renderMotoristasTab();
  else if(activeTab==='veiculos') renderVeiculosTab();
  else if(activeTab==='alertas') renderAlertasTab();
  else renderOperacaoTab();
  if(editingMotoristaId!==null) renderMotoristaModal();
  if(editingVeiculoId!==null) renderVeiculoModal();
}

// ─── Aba Motoristas ───────────────────────────────────────────────────────────
function sortMotoristas(list){
  return [...list].sort((a,b)=>{
    if(sortM==='cnhVencimento'){
      const da=a.cnhVencimento||'9999', db=b.cnhVencimento||'9999';
      return da.localeCompare(db);
    }
    if(sortM==='dataNascimento'){
      const da=a.dataNascimento||'9999', db=b.dataNascimento||'9999';
      return da.localeCompare(db);
    }
    if(sortM==='situacao'){
      const order={ativo:0,afastado:1,desligado:2};
      return (order[a.situacao||'ativo']||0)-(order[b.situacao||'ativo']||0);
    }
    return (a.nome||'').localeCompare(b.nome||'');
  });
}

function renderMotoristasTab(){

    else if(activeFilter==='semveiculo'){ if(veiculos.some(v=>v.motoristaAtualId===r.id)) return false; }
    else if(activeFilter!=='all'){ if((r.situacao||'ativo')!==activeFilter) return false; }
    if(!searchTerm) return true;
    const t=searchTerm.toLowerCase();
    return [r.nome,r.cpf,r.cnhNumero,r.telefone,r.antt,r.rg].some(v=>(v||'').toLowerCase().includes(t));

  filtered=sortMotoristas(filtered);
  const total=filtered.length;

// ─── Aba Veículos ─────────────────────────────────────────────────────────────
function sortVeiculosFn(list){
  return [...list].sort((a,b)=>{
    if(sortV==='marcaModelo') return (a.marcaModelo||'').localeCompare(b.marcaModelo||'');
    if(sortV==='ano') return parseInt(b.ano||0)-parseInt(a.ano||0);
    if(sortV==='crlvVencimento'){ const da=a.crlvVencimento||'9999', db=b.crlvVencimento||'9999'; return da.localeCompare(db); }
    return formatPlaca(a.placa||'').localeCompare(formatPlaca(b.placa||''));
  });
}

// ─── Aba Alertas ──────────────────────────────────────────────────────────────
function renderAlertasTab(){
  const body=document.getElementById('tab-body');

  const cnhVencidas      = motoristas.filter(r=>{ const s=cnhStatus(r.cnhVencimento); return s.d!==null&&s.d<0; }).sort((a,b)=>a.cnhVencimento.localeCompare(b.cnhVencimento));
  const cnh30            = motoristas.filter(r=>{ const s=cnhStatus(r.cnhVencimento); return s.d!==null&&s.d>=0&&s.d<=30; }).sort((a,b)=>a.cnhVencimento.localeCompare(b.cnhVencimento));
  const cnh60            = motoristas.filter(r=>{ const s=cnhStatus(r.cnhVencimento); return s.d!==null&&s.d>30&&s.d<=60; }).sort((a,b)=>a.cnhVencimento.localeCompare(b.cnhVencimento));
  const crlvAlert        = veiculos.filter(v=>{ const s=crlvStatus(v.crlvVencimento); return s.d!==null&&s.d<=60; }).sort((a,b)=>(a.crlvVencimento||'').localeCompare(b.crlvVencimento||''));
  const semMotorista     = veiculos.filter(v=>!v.motoristaAtualId);

  function mRow(r, dotColor, badgeColor, badgeText){
    const age=calcAge(r.dataNascimento);
    return `<div class="alert-row" onclick="App.openEditMotorista('${r.id}')">
      <div class="alert-dot ${dotColor}"></div>
      <div class="alert-name">${esc(r.nome)}${age?` <span style="font-size:.7rem;color:var(--muted);font-weight:400;">${age}a</span>`:''}</div>
      <div class="alert-detail">CNH ${esc(r.cnhNumero||'—')}</div>
      <span class="alert-badge ${badgeColor}">${badgeText}</span>
    </div>`;
  }

  function vRow(v, dotColor, badgeColor, badgeText){
    return `<div class="alert-row" onclick="App.openEditVeiculo('${v.id}')">
      <div class="alert-dot ${dotColor}"></div>
      <div class="alert-name">${esc(formatPlaca(v.placa))}</div>
      <div class="alert-detail">${esc(v.marcaModelo||'—')}</div>
      <span class="alert-badge ${badgeColor}">${badgeText}</span>
    </div>`;
  }

  const total=cnhVencidas.length+cnh30.length+cnh60.length+crlvAlert.length+semMotorista.length;

  if(total===0){
    body.innerHTML=`<div class="empty" style="margin-top:3rem;"><i>✅ Tudo em ordem!</i>Nenhum alerta no momento.</div>`;
    return;
  }

  let html='';

  if(cnhVencidas.length){
    html+=`<div class="alert-section"><p class="alert-section-title red">🔴 CNH Vencida (${cnhVencidas.length})</p>`;
    cnhVencidas.forEach(r=>{ const s=cnhStatus(r.cnhVencimento); html+=mRow(r,'red','red',s.label); });
    html+='</div>';
  }
  if(cnh30.length){
    html+=`<div class="alert-section"><p class="alert-section-title red">🔴 CNH vence em até 30 dias (${cnh30.length})</p>`;
    cnh30.forEach(r=>{ const s=cnhStatus(r.cnhVencimento); html+=mRow(r,'red','red',s.label); });
    html+='</div>';
  }
  if(cnh60.length){
    html+=`<div class="alert-section"><p class="alert-section-title orange">🟡 CNH vence em 31–60 dias (${cnh60.length})</p>`;
    cnh60.forEach(r=>{ const s=cnhStatus(r.cnhVencimento); html+=mRow(r,'orange','orange',s.label); });
    html+='</div>';
  }
  if(crlvAlert.length){
    html+=`<div class="alert-section"><p class="alert-section-title ${crlvAlert.some(v=>crlvStatus(v.crlvVencimento).d<=30)?'red':'orange'}">📄 CRLV a vencer (${crlvAlert.length})</p>`;
    crlvAlert.forEach(v=>{ const s=crlvStatus(v.crlvVencimento); html+=vRow(v,s.d<=30?'red':'orange',s.d<=30?'red':'orange',s.label); });
    html+='</div>';
  }
  if(semMotorista.length){
    html+=`<div class="alert-section"><p class="alert-section-title">🚛 Veículos sem motorista (${semMotorista.length})</p>`;
    semMotorista.forEach(v=>{ html+=vRow(v,'gray','','sem motorista'); });
    html+='</div>';
  }

  body.innerHTML=html+'<div style="height:2rem;"></div>';
}

// ─── Modal Motorista ──────────────────────────────────────────────────────────
function renderMotoristaModal(){
  const isNew=editingMotoristaId==='new';
  const rec=isNew?blankMotorista():(motoristas.find(r=>r.id===editingMotoristaId)||blankMotorista());
  const locked=!isNew&&!motoristaUnlocked;

  const inputs=motoristaFields().map(([key,label,mono,type])=>{
    const full=type==='full', isDate=type==='date', isTextarea=type==='textarea';
    const isSituacao=type==='situacao', isCategoria=type==='categoria';
    if(isSituacao){
      const opts=['ativo','afastado','desligado'].map(v=>`<option value="${v}" ${(rec.situacao||'ativo')===v?'selected':''}>${SITUACAO_LABELS[v]}</option>`).join('');
      return `<div class="field"><label for="f-${key}">${label}</label><select id="f-${key}" data-key="${key}" ${locked?'disabled':''}>${opts}</select></div>`;
    }
    if(isCategoria){
      const opts=CNH_CATEGORIAS.map(c=>`<option value="${c}" ${rec.cnhCategoria===c?'selected':''}>${c}</option>`).join('');
      return `<div class="field"><label for="f-${key}">${label}</label><select id="f-${key}" data-key="${key}" ${locked?'disabled':''}><option value="">—</option>${opts}</select></div>`;
    }
    if(isTextarea){
      return `<div class="field" style="grid-column:1/-1"><label for="f-${key}">${label}</label><textarea id="f-${key}" data-key="${key}" ${locked?'disabled':''}>${esc(rec[key]||'')}</textarea></div>`;
    }
    return `<div class="field" ${full?'style="grid-column:1/-1"':''}><label for="f-${key}">${label}</label><input id="f-${key}" data-key="${key}" data-mono="${mono?1:0}" type="${isDate?'date':'text'}" value="${esc(rec[key]||'')}" ${locked?'disabled':''}></div>`;
  }).join('');

  const assigned=veiculos.filter(v=>v.motoristaAtualId===rec.id);
  const veiculosSection=!isNew&&assigned.length?`
    <div class="section-label">Veículos vinculados (${assigned.length})</div>
    <div style="display:flex;flex-direction:column;gap:.4rem;">
      ${assigned.map(v=>`<div class="veiculo-row" onclick="App.closeMotoristaModal();App.openEditVeiculo('${v.id}')"><span class="pill type" style="font-size:.66rem;">${esc(TIPO_LABELS[v.tipo]||v.tipo)}</span><span style="font-family:var(--mono);font-size:.8rem;font-weight:500;">${esc(formatPlaca(v.placa))}</span><span style="font-size:.8rem;color:var(--muted);flex:1;">${esc(v.marcaModelo||'')}</span><span style="font-size:.75rem;color:var(--muted);">→</span></div>`).join('')}
    </div>`:'';

  const actions=locked
    ?`<span></span><button class="btn primary" onclick="App.unlockMotorista()">Editar</button>`
    :`${isNew?'<span></span>':`<button class="btn ghost" onclick="App.confirmDeleteMotorista('${rec.id}')">Excluir motorista</button>`}
      <div style="display:flex;gap:.6rem;"><button class="btn" onclick="App.closeMotoristaModal()">Cancelar</button><button id="btn-salvar-motorista" class="btn primary" onclick="App.submitMotorista('${rec.id}',${isNew})">Salvar</button></div>`;

  const age=calcAge(rec.dataNascimento);
  document.getElementById('modal-slot').innerHTML+=`
    <div class="modal-bg" onclick="if(event.target===this)App.closeMotoristaModal()">
      <div class="modal" id="modal-motorista">
        <button class="modal-close" onclick="App.closeMotoristaModal()" aria-label="Fechar">×</button>
        <h2>${isNew?'Novo motorista':esc(rec.nome||'Editar motorista')}${age&&!isNew?` <span style="font-size:.85rem;color:var(--muted);font-weight:400;">${age} anos</span>`:''}</h2>
        <p class="sub">${locked?'Visualizando · clique em Editar para alterar':'Dados do motorista'}</p>
        <div class="section-label">Motorista</div>
        <div class="fgrid">${inputs}</div>
        ${veiculosSection}
        <div class="modal-actions">${actions}</div>
      </div>
    </div>`;
}

        <button class="modal-close" onclick="App.closeVeiculoModal()" aria-label="Fechar">×</button>

            <option value="reboque" ${rec.tipo==='reboque'?'selected':''}>Reboque</option>
            <option value="semireboque" ${rec.tipo==='semireboque'?'selected':''}>Semi-reboque</option>
            <option value="caminhao" ${rec.tipo==='caminhao'?'selected':''}>Caminhão (carga simples)</option>
          </select></div>

            <div id="cnh-badge" class="cnh-badge">${cnhBadgeHtml(rec.motoristaAtualId)}</div>
          </div>
        </div>
        <div class="section-label">Veículo</div>
        <div class="fgrid">${inputs}</div>
        ${histSection}
        <div class="modal-actions">${actions}</div>
      </div>
    </div>`;
}

async function waitForStorage(maxWaitMs){
  const start=Date.now();
  while(!window.storage&&(Date.now()-start)<maxWaitMs) await new Promise(r=>setTimeout(r,100));
  return !!window.storage;
}

// Comando de emergência via console: resetarSenha()
window.resetarSenha=async function(){
  await clearStoredHash();
  isSetup=true; isLocked=false;
  alert('Senha removida. Você pode criar uma nova agora.');
  renderSetupScreen();
};

async function boot(){
  const ready=await waitForStorage(4000);
  if(!ready){
    lastLoadError='window.storage nao ficou disponivel a tempo.';
    motoristas=[]; veiculos=[]; render(); return;
  }
  // Check security before loading data
  let hash=null;
  try{ hash=await getStoredHash(); }catch(e){ console.error('Erro ao buscar hash:',e); }
  if(!hash){ isSetup=true; isLocked=false; renderSetupScreen(); }
  else { isLocked=true; renderLockScreen(); }
  // Load data in background
  try{ await seedIfNeeded(); }catch(e){ console.error('seedIfNeeded falhou:',e); }
  await loadAll();
}

boot();
