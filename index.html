<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acompanhamento de Operação — Contêiner</title>
<style>
  :root {
    --bg: #14171c;
    --panel: #1c2128;
    --panel-raised: #232932;
    --border: #323a45;
    --text: #e8eaed;
    --text-dim: #9aa3af;
    --accent: #ff8a3d;
    --accent-dim: #5c3a22;
    --done: #3ddc97;
    --done-dim: #1c3d31;
    --pending: #4a525e;
    --danger: #ff5c5c;
    --radius: 10px;
    --mono: 'SF Mono', 'Consolas', 'Menlo', monospace;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 560px;
    margin: 0 auto;
    padding: 20px 16px 80px;
  }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 0;
  }

  header .tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 3px 8px;
    border-radius: 5px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 14px;
  }

  .card-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    margin: 0 0 12px 0;
  }

  .field {
    margin-bottom: 12px;
  }

  .field:last-child { margin-bottom: 0; }

  .field label {
    display: block;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .field input, .field select {
    width: 100%;
    background: var(--panel-raised);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 12px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
  }

  .field input:focus, .field select:focus {
    outline: none;
    border-color: var(--accent);
  }

  .row2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .stage {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .stage.is-done {
    border-color: var(--done-dim);
  }

  .stage.is-pending {
    border-color: var(--accent-dim);
  }

  .stage.is-pending .stage-dot {
    background: var(--accent);
  }

  .stage.is-pending .stage-time {
    color: var(--accent);
  }

  .stage-head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--panel);
  }

  .stage-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--pending);
    flex-shrink: 0;
  }

  .stage.is-done .stage-dot {
    background: var(--done);
  }

  .stage-info {
    flex: 1;
  }

  .stage-name {
    font-size: 14.5px;
    font-weight: 600;
  }

  .stage-time {
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .stage.is-done .stage-time {
    color: var(--done);
  }

  .stage-body {
    padding: 0 16px 16px;
    background: var(--panel);
    display: none;
  }

  .stage-body.open {
    display: block;
  }

  .pending-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12.5px;
    color: var(--text-dim);
    margin-bottom: 12px;
    cursor: pointer;
  }

  .pending-toggle input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--accent);
    flex-shrink: 0;
    cursor: pointer;
  }

  .time-controls {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .time-controls input[type="time"],
  .time-controls input[type="date"] {
    flex: 1;
    min-width: 130px;
    background: var(--panel-raised);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 15px;
    font-family: var(--mono);
  }

  .time-controls input[type="time"]:focus,
  .time-controls input[type="date"]:focus {
    outline: none;
    border-color: var(--accent);
  }

  .btn-now {
    background: var(--panel-raised);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 8px;
    padding: 0 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }

  .btn-now:hover { border-color: var(--accent); color: var(--accent); }

  .extra-field {
    margin-bottom: 10px;
  }

  .extra-field label {
    display: block;
    font-size: 12.5px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .extra-field input {
    width: 100%;
    background: var(--panel-raised);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 14.5px;
    font-family: inherit;
  }

  .extra-field input:focus { outline: none; border-color: var(--accent); }

  .btn-send {
    width: 100%;
    background: var(--accent);
    color: #1a1106;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-size: 14.5px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 4px;
  }

  .btn-send:hover { filter: brightness(1.08); }
  .btn-send:disabled {
    background: var(--pending);
    color: var(--text-dim);
    cursor: not-allowed;
  }

  .hint {
    font-size: 11.5px;
    color: var(--text-dim);
    margin-top: 8px;
    line-height: 1.4;
  }

  .dest-card {
    display: none;
  }
  .dest-card.visible { display: block; }

  .summary-bar {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 14px;
    padding: 0 2px;
  }

  .summary-bar b { color: var(--accent); }

  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--done);
    color: #07261a;
    padding: 11px 20px;
    border-radius: 8px;
    font-size: 13.5px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.25s ease;
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .reset-link {
    display: block;
    text-align: center;
    color: var(--text-dim);
    font-size: 12.5px;
    margin-top: 18px;
    cursor: pointer;
    text-decoration: underline;
  }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <h1>Acompanhamento de Operação</h1>
    <span class="tag">CONTÊINER</span>
  </header>

  <div class="summary-bar">
    <span>Etapas concluídas: <b id="doneCount">0</b>/4</span>
    <span id="clockNow"></span>
  </div>

  <!-- DADOS GERAIS -->
  <div class="card">
    <p class="card-title">Dados da operação</p>
    <div class="field">
      <label for="driverName">Nome do motorista / funcionário</label>
      <input type="text" id="driverName" placeholder="Ex: João Silva" autocomplete="off">
    </div>
    <div class="row2">
      <div class="field">
        <label for="plateCavalo">Placa do cavalo</label>
        <input type="text" id="plateCavalo" placeholder="Ex: ABC1D23" autocomplete="off">
      </div>
      <div class="field">
        <label for="plateReboque">Placa do reboque</label>
        <input type="text" id="plateReboque" placeholder="Ex: XYZ9E87" autocomplete="off">
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label for="containerNum">Nº do contêiner</label>
        <input type="text" id="containerNum" placeholder="Ex: ABCU1234567" autocomplete="off">
      </div>
      <div class="field">
        <label for="refNum">Referência</label>
        <input type="text" id="refNum" placeholder="Ex: 88421" autocomplete="off">
      </div>
    </div>
  </div>

  <!-- ETAPAS -->
  <div id="stagesContainer"></div>

  <!-- DESTINO -->
  <div class="card dest-card" id="destCard">
    <p class="card-title">Enviar atualização para</p>
    <div class="field">
      <label for="destEmail">E-mail de destino</label>
      <input type="email" id="destEmail" placeholder="cliente@empresa.com">
    </div>
    <div class="field">
      <label for="destWhats">WhatsApp de destino (com DDD)</label>
      <input type="tel" id="destWhats" placeholder="Ex: 11987654321">
    </div>
    <div class="hint">Esses dados ficam salvos neste aparelho para os próximos envios.</div>
  </div>

  <div class="reset-link" id="resetLink">Limpar todos os dados e começar de novo</div>

</div>

<div class="toast" id="toast"></div>

<script>
  const STAGES = [
    { key: 'agendamentoRetirada', label: 'Agendamento / Retirada do contêiner' },
    { key: 'entrega', label: 'Chegada/entrega no cliente' },
    { key: 'descarga', label: 'Finalização da descarga' },
    { key: 'devolucao', label: 'Devolução do vazio', extra: [
        { key: 'terminalVazio', label: 'Terminal do vazio' }
      ]
    },
  ];

  const STORAGE_KEY = 'containerTrackerState_v1';

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return {
      driverName: '', plateCavalo: '', plateReboque: '', containerNum: '', refNum: '',
      destEmail: '', destWhats: '',
      stages: {}, openStage: null
    };
  }

  let state = loadState();
  STAGES.forEach(s => {
    if (!state.stages[s.key]) {
      state.stages[s.key] = { date: '', time: '', pending: false, sent: false, extra: {} };
    }
    if (state.stages[s.key].pending === undefined) {
      state.stages[s.key].pending = false;
    }
  });

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function nowHM() {
    const d = new Date();
    return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }

  function todayYMD() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function formatDateBR(ymd) {
    if (!ymd) return '';
    const parts = ymd.split('-');
    if (parts.length !== 3) return ymd;
    return parts[2] + '/' + parts[1] + '/' + parts[0];
  }

  function updateClock() {
    document.getElementById('clockNow').textContent = nowHM();
  }
  updateClock();
  setInterval(updateClock, 30000);

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
  }

  function escapeHtml(str) {
    return (str || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function render() {
    document.getElementById('driverName').value = state.driverName;
    document.getElementById('plateCavalo').value = state.plateCavalo;
    document.getElementById('plateReboque').value = state.plateReboque;
    document.getElementById('containerNum').value = state.containerNum;
    document.getElementById('refNum').value = state.refNum;
    document.getElementById('destEmail').value = state.destEmail;
    document.getElementById('destWhats').value = state.destWhats;

    const container = document.getElementById('stagesContainer');
    container.innerHTML = '';

    let doneCount = 0;

    STAGES.forEach((stageDef, idx) => {
      const st = state.stages[stageDef.key];
      const isFilled = st.time && st.date;
      if (isFilled) doneCount++;

      const isOpen = state.openStage === stageDef.key;

      const stageEl = document.createElement('div');
      stageEl.className = 'stage' + (isFilled ? ' is-done' : st.pending ? ' is-pending' : '');

      let timeDisplay;
      if (st.pending) {
        timeDisplay = 'A confirmar';
      } else if (isFilled) {
        timeDisplay = formatDateBR(st.date) + ' ' + st.time + (st.sent ? ' · enviado' : ' · não enviado');
      } else if (st.date || st.time) {
        timeDisplay = 'Incompleto (falta data ou horário)';
      } else {
        timeDisplay = 'Pendente';
      }

      const head = document.createElement('div');
      head.className = 'stage-head';
      head.innerHTML = `
        <div class="stage-dot"></div>
        <div class="stage-info">
          <div class="stage-name">${idx + 1}. ${escapeHtml(stageDef.label)}</div>
          <div class="stage-time">${timeDisplay}</div>
        </div>
      `;
      head.onclick = () => {
        state.openStage = isOpen ? null : stageDef.key;
        saveState();
        render();
      };

      const body = document.createElement('div');
      body.className = 'stage-body' + (isOpen ? ' open' : '');

      let extraHtml = '';
      if (stageDef.extra) {
        stageDef.extra.forEach(ex => {
          extraHtml += `
            <div class="extra-field">
              <label>${escapeHtml(ex.label)}</label>
              <input type="text" data-extra-key="${ex.key}" data-stage="${stageDef.key}" value="${escapeHtml(st.extra[ex.key] || '')}" placeholder="Ex: Terminal Santos Brasil">
            </div>
          `;
        });
      }

      body.innerHTML = `
        <label class="pending-toggle">
          <input type="checkbox" data-stage="${stageDef.key}" class="pending-checkbox" ${st.pending ? 'checked' : ''}>
          <span>Horário ainda não definido (marcar como "A confirmar")</span>
        </label>
        <div class="time-controls">
          <input type="date" data-stage="${stageDef.key}" class="date-input" value="${st.date || ''}" ${st.pending ? 'disabled' : ''}>
          <input type="time" data-stage="${stageDef.key}" class="time-input" value="${st.time || ''}" ${st.pending ? 'disabled' : ''}>
          <button type="button" class="btn-now" data-stage="${stageDef.key}" ${st.pending ? 'disabled' : ''}>Agora</button>
        </div>
        ${extraHtml}
        <button type="button" class="btn-send" data-stage="${stageDef.key}" ${!isFilled ? 'disabled' : ''}>
          Enviar atualização desta etapa
        </button>
        <div class="hint">O envio inclui esta etapa e todas as anteriores já preenchidas. Etapas marcadas como "A confirmar" não liberam envio.</div>
      `;

      stageEl.appendChild(head);
      stageEl.appendChild(body);
      container.appendChild(stageEl);
    });

    document.getElementById('doneCount').textContent = doneCount;

    const destCard = document.getElementById('destCard');
    destCard.classList.add('visible');

    attachStageEvents();
  }

  function attachStageEvents() {
    document.querySelectorAll('.pending-checkbox').forEach(chk => {
      chk.onchange = (e) => {
        const stageKey = e.target.dataset.stage;
        state.stages[stageKey].pending = e.target.checked;
        if (e.target.checked) {
          state.stages[stageKey].date = '';
          state.stages[stageKey].time = '';
        }
        saveState();
        render();
        state.openStage = stageKey;
        saveState();
      };
    });

    document.querySelectorAll('.date-input').forEach(inp => {
      inp.onchange = (e) => {
        const stageKey = e.target.dataset.stage;
        state.stages[stageKey].date = e.target.value;
        saveState();
        render();
        state.openStage = stageKey;
        saveState();
      };
    });

    document.querySelectorAll('.time-input').forEach(inp => {
      inp.onchange = (e) => {
        const stageKey = e.target.dataset.stage;
        state.stages[stageKey].time = e.target.value;
        saveState();
        render();
        state.openStage = stageKey;
        saveState();
      };
    });

    document.querySelectorAll('.btn-now').forEach(btn => {
      btn.onclick = (e) => {
        const stageKey = e.target.dataset.stage;
        state.stages[stageKey].time = nowHM();
        state.stages[stageKey].date = todayYMD();
        saveState();
        render();
        state.openStage = stageKey;
        saveState();
      };
    });

    document.querySelectorAll('[data-extra-key]').forEach(inp => {
      inp.onchange = (e) => {
        const stageKey = e.target.dataset.stage;
        const extraKey = e.target.dataset.extraKey;
        state.stages[stageKey].extra[extraKey] = e.target.value;
        saveState();
      };
    });

    document.querySelectorAll('.btn-send').forEach(btn => {
      btn.onclick = (e) => {
        const stageKey = e.target.dataset.stage;
        sendUpdate(stageKey);
      };
    });
  }

  document.getElementById('driverName').oninput = (e) => { state.driverName = e.target.value; saveState(); };
  document.getElementById('plateCavalo').oninput = (e) => { state.plateCavalo = e.target.value; saveState(); };
  document.getElementById('plateReboque').oninput = (e) => { state.plateReboque = e.target.value; saveState(); };
  document.getElementById('containerNum').oninput = (e) => { state.containerNum = e.target.value; saveState(); };
  document.getElementById('refNum').oninput = (e) => { state.refNum = e.target.value; saveState(); };
  document.getElementById('destEmail').oninput = (e) => { state.destEmail = e.target.value; saveState(); };
  document.getElementById('destWhats').oninput = (e) => { state.destWhats = e.target.value; saveState(); };

  document.getElementById('resetLink').onclick = () => {
    if (confirm('Tem certeza? Isso vai apagar todos os dados preenchidos (horários, contêiner, referência).')) {
      localStorage.removeItem(STORAGE_KEY);
      state = loadState();
      STAGES.forEach(s => {
        if (!state.stages[s.key]) state.stages[s.key] = { date: '', time: '', pending: false, sent: false, extra: {} };
      });
      render();
      showToast('Dados limpos');
    }
  };

  function buildMessageText(uptoStageKey) {
    const lines = [];
    lines.push('ATUALIZAÇÃO DE OPERAÇÃO');
    lines.push('');
    lines.push('Motorista/Funcionário: ' + (state.driverName || '-'));
    lines.push('Placa cavalo: ' + (state.plateCavalo || '-'));
    lines.push('Placa reboque: ' + (state.plateReboque || '-'));
    lines.push('Contêiner: ' + (state.containerNum || '-'));
    lines.push('Referência: ' + (state.refNum || '-'));
    lines.push('');

    let reached = false;
    STAGES.forEach(stageDef => {
      const st = state.stages[stageDef.key];
      if (st.pending) {
        lines.push(stageDef.label + ': A confirmar');
      } else if (st.time && st.date) {
        lines.push(stageDef.label + ': ' + formatDateBR(st.date) + ' ' + st.time);
        if (stageDef.extra) {
          stageDef.extra.forEach(ex => {
            if (st.extra[ex.key]) {
              lines.push('  ' + ex.label + ': ' + st.extra[ex.key]);
            }
          });
        }
      } else {
        return;
      }
      if (stageDef.key === uptoStageKey) reached = true;
    });

    return lines.join('\n');
  }

  function sendUpdate(stageKey) {
    const email = state.destEmail.trim();
    const whats = state.destWhats.trim().replace(/\D/g, '');

    if (!email && !whats) {
      showToast('Preencha e-mail ou WhatsApp de destino');
      document.getElementById('destEmail').focus();
      return;
    }

    const stageLabel = STAGES.find(s => s.key === stageKey).label;
    const subject = `Atualização contêiner ${state.containerNum || ''} — ${stageLabel}`;
    const bodyText = buildMessageText(stageKey);

    if (email) {
      const mailtoUrl = `mailto:${encodeURIComponent(email)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(bodyText)}`;
      window.location.href = mailtoUrl;
    }

    if (whats) {
      const waUrl = `https://wa.me/55${whats.replace(/^55/, '')}?text=${encodeURIComponent(bodyText)}`;
      setTimeout(() => {
        window.open(waUrl, '_blank');
      }, email ? 400 : 0);
    }

    state.stages[stageKey].sent = true;
    saveState();
    render();
    showToast('Atualização preparada para envio');
  }

  render();
</script>

</body>
</html>
