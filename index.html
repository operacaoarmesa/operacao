<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acompanhamento de Operação — Contêiner</title>
<style>
  :root {
    --bg: #14171c;
    --panel: #1c2128;
    --panel-raised: #232932;
    --border: #323a45;
    --text: #e8eaed;
    --text-dim: #9aa3af;
    --accent: #ff8a3d;
    --accent-dim: #5c3a22;
    --done: #3ddc97;
    --done-dim: #1c3d31;
    --pending: #4a525e;
    --danger: #ff5c5c;
    --radius: 10px;
    --mono: 'SF Mono', 'Consolas', 'Menlo', monospace;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 560px;
    margin: 0 auto;
    padding: 20px 16px 80px;
  }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 0;
  }

  header .tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 3px 8px;
    border-radius: 5px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 14px;
  }

  .card-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    margin: 0 0 12px 0;
  }

  .field {
    margin-bottom: 12px;
  }

  .field:last-child { margin-bottom: 0; }

  .field label {
    display: block;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .field input, .field select, .field textarea {
    width: 100%;
    background: var(--panel-raised);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 12px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    resize: vertical;
  }

  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  .row2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .stage {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .stage.is-done {
    border-color: var(--done-dim);
  }

  .stage.is-pending {
    border-color: var(--accent-dim);
  }

  .stage.is-pending .stage-dot {
    background: var(--accent);
  }

  .stage.is-pending .stage-time {
    color: var(--accent);
  }

  .stage-head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--panel);
  }

  .stage-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--pending);
    flex-shrink: 0;
  }

  .stage.is-done .stage-dot {
    background: var(--done);
  }

  .stage-info {
    flex: 1;
  }

  .stage-name {
    font-size: 14.5px;
    font-weight: 600;
  }

  .stage-time {
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .stage.is-done .stage-time {
    color: var(--done);
  }

  .stage-body {
    padding: 0 16px 16px;
    background: var(--panel);
    display: none;
  }

  .stage-body.open {
    display: block;
  }

  .pending-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12.5px;
    color: var(--text-dim);
    margin-bottom: 12px;
    cursor: pointer;
  }

  .pending-toggle input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--accent);
    flex-shrink: 0;
    cursor: pointer;
  }

  .time-controls {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .time-controls input[type="time"],
  .time-controls input[type="date"] {
    flex: 1;
    min-width: 130px;
    background: var(--panel-raised);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 15px;
    font-family: var(--mono);
  }

  .time-controls input[type="time"]:focus,
  .time-controls input[type="date"]:focus {
    outline: none;
    border-color: var(--accent);
  }

  .btn-now {
    background: var(--panel-raised);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 8px;
    padding: 0 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }

  .btn-now:hover { border-color: var(--accent); color: var(--accent); }

  .extra-field {
    margin-bottom: 10px;
  }

  .extra-field label {
    display: block;
    font-size: 12.5px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .extra-field input {
    width: 100%;
    background: var(--panel-raised);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 14.5px;
    font-family: inherit;
  }

  .extra-field input:focus { outline: none; border-color: var(--accent); }

  .btn-send {
    width: 100%;
    background: var(--accent);
    color: #1a1106;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-size: 14.5px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 4px;
  }

  .btn-send:hover { filter: brightness(1.08); }
  .btn-send:disabled {
    background: var(--pending);
    color: var(--text-dim);
    cursor: not-allowed;
  }

  .hint {
    font-size: 11.5px;
    color: var(--text-dim);
    margin-top: 8px;
    line-height: 1.4;
  }

  .dest-card {
    display: none;
  }
  .dest-card.visible { display: block; }

  .summary-bar {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 14px;
    padding: 0 2px;
  }

  .summary-bar b { color: var(--accent); }

  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--done);
    color: #07261a;
    padding: 11px 20px;
    border-radius: 8px;
    font-size: 13.5px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.25s ease;
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .channel-toggle {
    display: block;
    background: var(--panel-raised);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .channel-toggle:has(input[type="checkbox"]:checked) {
    border-color: var(--accent);
  }

  .channel-check {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 0;
  }

  .channel-check input[type="checkbox"] {
    width: 17px;
    height: 17px;
    accent-color: var(--accent);
    flex-shrink: 0;
    cursor: pointer;
  }

  .channel-label {
    font-size: 14.5px;
    font-weight: 600;
  }

  .channel-input {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 11px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    margin-top: 10px;
    display: block;
  }

  .channel-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .btn-send-final {
    width: 100%;
    background: var(--accent);
    color: #1a1106;
    border: none;
    border-radius: 10px;
    padding: 16px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    letter-spacing: 0.01em;
  }

  .btn-send-final:hover { filter: brightness(1.08); }

  .reset-link {
    display: block;
    text-align: center;
    color: var(--text-dim);
    font-size: 12.5px;
    margin-top: 18px;
    cursor: pointer;
    text-decoration: underline;
  }

  .search-row {
    display: flex;
    gap: 8px;
  }

  .search-row input {
    flex: 1;
    background: var(--panel-raised);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
  }

  .search-row input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .search-row button {
    background: var(--accent);
    color: #1a1106;
    border: none;
    border-radius: 8px;
    padding: 0 18px;
    font-size: 13.5px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
  }

  .search-row button:hover { filter: brightness(1.08); }

  .search-result-item {
    margin-top: 10px;
    background: var(--panel-raised);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .search-result-item:hover { border-color: var(--accent); }

  .search-result-item .res-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 3px;
  }

  .search-result-item .res-sub {
    font-size: 12px;
    color: var(--text-dim);
  }

  .search-empty {
    margin-top: 10px;
    font-size: 13px;
    color: var(--text-dim);
  }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <h1>Acompanhamento de Operação</h1>
    <span class="tag">CONTÊINER</span>
  </header>

  <div class="summary-bar">
    <span>Etapas concluídas: <b id="doneCount">0</b>/4</span>
    <span id="clockNow"></span>
  </div>

  <!-- MENSAGEM (primeiro campo) -->
  <div class="card">
    <p class="card-title">Mensagem / Observações da operação</p>
    <div class="field">
      <textarea id="operMsg" rows="3" placeholder="Ex: Boa tarde, segue as datas e horários da operação..."></textarea>
    </div>
  </div>

  <!-- BUSCA DE HISTÓRICO -->
  <div class="card" id="historyCard">
    <p class="card-title">Buscar operação anterior</p>
    <div class="search-row">
      <input type="text" id="searchQuery" placeholder="Nº do contêiner ou referência..." autocomplete="off">
      <button type="button" id="searchBtn">Buscar</button>
    </div>
    <div id="searchResults"></div>
  </div>

  <!-- DADOS GERAIS -->
  <div class="card">
    <p class="card-title">Dados da operação</p>
    <div class="field">
      <label for="driverName">Nome do motorista / funcionário</label>
      <input type="text" id="driverName" placeholder="Ex: João Silva" autocomplete="off">
    </div>
    <div class="row2">
      <div class="field">
        <label for="plateCavalo">Placa do cavalo</label>
        <input type="text" id="plateCavalo" placeholder="Ex: ABC1D23" autocomplete="off">
      </div>
      <div class="field">
        <label for="plateReboque">Placa do reboque</label>
        <input type="text" id="plateReboque" placeholder="Ex: XYZ9E87" autocomplete="off">
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label for="containerNum">Nº do contêiner</label>
        <input type="text" id="containerNum" placeholder="Ex: ABCU1234567" autocomplete="off">
      </div>
      <div class="field">
        <label for="refNum">Referência</label>
        <input type="text" id="refNum" placeholder="Ex: 88421" autocomplete="off">
      </div>
    </div>
  </div>

  <!-- ETAPAS -->
  <div id="stagesContainer"></div>

  <!-- DESTINO -->
  <div class="card dest-card" id="destCard">
    <p class="card-title">Enviar via</p>

    <label class="channel-toggle" id="toggleEmail">
      <div class="channel-check">
        <input type="checkbox" id="useEmail" checked>
        <span class="channel-label">📧 E-mail</span>
      </div>
      <input type="email" id="destEmail" placeholder="cliente@empresa.com" class="channel-input">
    </label>

    <label class="channel-toggle" id="toggleWhats">
      <div class="channel-check">
        <input type="checkbox" id="useWhats" checked>
        <span class="channel-label">💬 WhatsApp</span>
      </div>
      <div class="hint" style="margin-top:4px;margin-bottom:0">Abre o WhatsApp Web — você escolhe a conversa para enviar.</div>
    </label>

    <div class="hint" style="margin-top:10px">O e-mail fica salvo neste aparelho para os próximos envios.</div>
  </div>

  <button type="button" class="btn-send-final" id="btnSendFinal">Enviar</button>

  <div class="reset-link" id="resetLink">Limpar todos os dados e começar de novo</div>

</div>

<div class="toast" id="toast"></div>

<script>
  const STAGES = [
    { key: 'agendamentoRetirada', label: 'Agendamento / Retirada do contêiner' },
    { key: 'entrega', label: 'Chegada/entrega no cliente' },
    { key: 'descarga', label: 'Finalização da descarga' },
    { key: 'devolucao', label: 'Devolução do vazio', extra: [
        { key: 'terminalVazio', label: 'Terminal do vazio' }
      ]
    },
  ];

  const STORAGE_KEY = 'containerTrackerState_v1';
  const HISTORY_KEY = 'containerTrackerHistory_v1';

  function loadHistory() {
    try {
      const raw = localStorage.getItem(HISTORY_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return [];
  }

  function saveToHistory() {
    if (!state.containerNum && !state.refNum) return;
    const history = loadHistory();
    const entry = {
      id: Date.now(),
      savedAt: new Date().toISOString(),
      driverName: state.driverName,
      plateCavalo: state.plateCavalo,
      plateReboque: state.plateReboque,
      containerNum: state.containerNum,
      refNum: state.refNum,
      operMsg: state.operMsg,
      stages: JSON.parse(JSON.stringify(state.stages)),
    };
    // Remove entrada anterior com mesmo contêiner ou referência
    const filtered = history.filter(h =>
      !(h.containerNum && h.containerNum === entry.containerNum) &&
      !(h.refNum && h.refNum === entry.refNum)
    );
    filtered.unshift(entry);
    // Guarda no máximo 50 entradas
    localStorage.setItem(HISTORY_KEY, JSON.stringify(filtered.slice(0, 50)));
  }

  function searchHistory(query) {
    if (!query.trim()) return [];
    const q = query.trim().toLowerCase();
    return loadHistory().filter(h =>
      (h.containerNum && h.containerNum.toLowerCase().includes(q)) ||
      (h.refNum && h.refNum.toLowerCase().includes(q))
    );
  }

  function applyHistoryEntry(entry) {
    state.driverName = entry.driverName || '';
    state.plateCavalo = entry.plateCavalo || '';
    state.plateReboque = entry.plateReboque || '';
    state.containerNum = entry.containerNum || '';
    state.refNum = entry.refNum || '';
    state.operMsg = entry.operMsg || '';
    // Restaura etapas salvas, ou limpa as que não existirem no registro
    STAGES.forEach(s => {
      state.stages[s.key] = (entry.stages && entry.stages[s.key])
        ? entry.stages[s.key]
        : { date: '', time: '', pending: false, sent: false, extra: {} };
    });
    state.openStage = null;
    saveState();
    render();
    document.getElementById('searchResults').innerHTML = '';
    document.getElementById('searchQuery').value = '';
    showToast('Operação carregada com todos os dados');
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return {
      driverName: '', plateCavalo: '', plateReboque: '', containerNum: '', refNum: '',
      operMsg: '',
      destEmail: '',
      stages: {}, openStage: null
    };
  }

  let state = loadState();
  STAGES.forEach(s => {
    if (!state.stages[s.key]) {
      state.stages[s.key] = { date: '', time: '', pending: false, sent: false, extra: {} };
    }
    if (state.stages[s.key].pending === undefined) {
      state.stages[s.key].pending = false;
    }
  });

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function nowHM() {
    const d = new Date();
    return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }

  function todayYMD() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function formatDateBR(ymd) {
    if (!ymd) return '';
    const parts = ymd.split('-');
    if (parts.length !== 3) return ymd;
    return parts[2] + '/' + parts[1] + '/' + parts[0];
  }

  function updateClock() {
    document.getElementById('clockNow').textContent = nowHM();
  }
  updateClock();
  setInterval(updateClock, 30000);

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
  }

  function escapeHtml(str) {
    return (str || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function render() {
    document.getElementById('driverName').value = state.driverName;
    document.getElementById('plateCavalo').value = state.plateCavalo;
    document.getElementById('plateReboque').value = state.plateReboque;
    document.getElementById('containerNum').value = state.containerNum;
    document.getElementById('refNum').value = state.refNum;
    document.getElementById('operMsg').value = state.operMsg || '';
    document.getElementById('destEmail').value = state.destEmail || '';

    const container = document.getElementById('stagesContainer');
    container.innerHTML = '';

    let doneCount = 0;

    STAGES.forEach((stageDef, idx) => {
      const st = state.stages[stageDef.key];
      const isFilled = st.time && st.date;
      if (isFilled) doneCount++;

      const isOpen = state.openStage === stageDef.key;

      const stageEl = document.createElement('div');
      stageEl.className = 'stage' + (isFilled ? ' is-done' : st.pending ? ' is-pending' : '');

      let timeDisplay;
      if (st.pending) {
        timeDisplay = 'A confirmar';
      } else if (isFilled) {
        timeDisplay = formatDateBR(st.date) + ' às ' + st.time;
      } else if (st.date || st.time) {
        timeDisplay = 'Incompleto (falta data ou horário)';
      } else {
        timeDisplay = 'Pendente';
      }

      const head = document.createElement('div');
      head.className = 'stage-head';
      head.innerHTML = `
        <div class="stage-dot"></div>
        <div class="stage-info">
          <div class="stage-name">${idx + 1}. ${escapeHtml(stageDef.label)}</div>
          <div class="stage-time">${timeDisplay}</div>
        </div>
      `;
      head.onclick = () => {
        state.openStage = isOpen ? null : stageDef.key;
        saveState();
        render();
      };

      const body = document.createElement('div');
      body.className = 'stage-body' + (isOpen ? ' open' : '');

      let extraHtml = '';
      if (stageDef.extra) {
        stageDef.extra.forEach(ex => {
          extraHtml += `
            <div class="extra-field">
              <label>${escapeHtml(ex.label)}</label>
              <input type="text" data-extra-key="${ex.key}" data-stage="${stageDef.key}" value="${escapeHtml(st.extra[ex.key] || '')}" placeholder="Ex: Terminal Santos Brasil">
            </div>
          `;
        });
      }

      body.innerHTML = `
        <label class="pending-toggle">
          <input type="checkbox" data-stage="${stageDef.key}" class="pending-checkbox" ${st.pending ? 'checked' : ''}>
          <span>Horário ainda não definido (marcar como "A confirmar")</span>
        </label>
        <div class="time-controls">
          <input type="date" data-stage="${stageDef.key}" class="date-input" value="${st.date || ''}" ${st.pending ? 'disabled' : ''}>
          <input type="time" data-stage="${stageDef.key}" class="time-input" value="${st.time || ''}" ${st.pending ? 'disabled' : ''}>
          <button type="button" class="btn-now" data-stage="${stageDef.key}" ${st.pending ? 'disabled' : ''}>Agora</button>
        </div>
        ${extraHtml}
      `;

      stageEl.appendChild(head);
      stageEl.appendChild(body);
      container.appendChild(stageEl);
    });

    document.getElementById('doneCount').textContent = doneCount;

    const destCard = document.getElementById('destCard');
    destCard.classList.add('visible');

    attachStageEvents();
  }

  function attachStageEvents() {
    document.querySelectorAll('.pending-checkbox').forEach(chk => {
      chk.onchange = (e) => {
        const stageKey = e.target.dataset.stage;
        state.stages[stageKey].pending = e.target.checked;
        if (e.target.checked) {
          state.stages[stageKey].date = '';
          state.stages[stageKey].time = '';
        }
        saveState();
        render();
        state.openStage = stageKey;
        saveState();
      };
    });

    document.querySelectorAll('.date-input').forEach(inp => {
      inp.onchange = (e) => {
        const stageKey = e.target.dataset.stage;
        state.stages[stageKey].date = e.target.value;
        saveState();
        render();
        state.openStage = stageKey;
        saveState();
      };
    });

    document.querySelectorAll('.time-input').forEach(inp => {
      inp.onchange = (e) => {
        const stageKey = e.target.dataset.stage;
        state.stages[stageKey].time = e.target.value;
        saveState();
        render();
        state.openStage = stageKey;
        saveState();
      };
    });

    document.querySelectorAll('.btn-now').forEach(btn => {
      btn.onclick = (e) => {
        const stageKey = e.target.dataset.stage;
        state.stages[stageKey].time = nowHM();
        state.stages[stageKey].date = todayYMD();
        saveState();
        render();
        state.openStage = stageKey;
        saveState();
      };
    });

    document.querySelectorAll('[data-extra-key]').forEach(inp => {
      inp.onchange = (e) => {
        const stageKey = e.target.dataset.stage;
        const extraKey = e.target.dataset.extraKey;
        state.stages[stageKey].extra[extraKey] = e.target.value;
        saveState();
      };
    });
  }

  document.getElementById('driverName').oninput = (e) => { state.driverName = e.target.value; saveState(); };
  document.getElementById('plateCavalo').oninput = (e) => { state.plateCavalo = e.target.value; saveState(); };
  document.getElementById('plateReboque').oninput = (e) => { state.plateReboque = e.target.value; saveState(); };
  document.getElementById('containerNum').oninput = (e) => { state.containerNum = e.target.value; saveState(); };
  document.getElementById('refNum').oninput = (e) => { state.refNum = e.target.value; saveState(); };
  document.getElementById('operMsg').oninput = (e) => { state.operMsg = e.target.value; saveState(); };

  document.getElementById('searchBtn').onclick = () => {
    const q = document.getElementById('searchQuery').value;
    const results = searchHistory(q);
    const container = document.getElementById('searchResults');
    if (!q.trim()) {
      container.innerHTML = '<div class="search-empty">Digite o número do contêiner ou referência para buscar.</div>';
      return;
    }
    if (results.length === 0) {
      container.innerHTML = '<div class="search-empty">Nenhuma operação encontrada.</div>';
      return;
    }
    container.innerHTML = '';
    results.forEach(entry => {
      const div = document.createElement('div');
      div.className = 'search-result-item';
      const date = entry.savedAt ? new Date(entry.savedAt).toLocaleDateString('pt-BR') : '';
      div.innerHTML = `
        <div class="res-title">📦 ${entry.containerNum || '—'} &nbsp;·&nbsp; Ref: ${entry.refNum || '—'}</div>
        <div class="res-sub">${entry.driverName || '—'} &nbsp;·&nbsp; ${entry.plateCavalo || '—'} / ${entry.plateReboque || '—'} &nbsp;·&nbsp; ${date}</div>
      `;
      div.onclick = () => applyHistoryEntry(entry);
      container.appendChild(div);
    });
  };

  document.getElementById('searchQuery').onkeydown = (e) => {
    if (e.key === 'Enter') document.getElementById('searchBtn').click();
  };
  document.getElementById('destEmail').oninput = (e) => { state.destEmail = e.target.value; saveState(); };

  document.getElementById('resetLink').onclick = () => {
    if (confirm('Tem certeza? Isso vai apagar todos os dados preenchidos (horários, contêiner, referência).')) {
      localStorage.removeItem(STORAGE_KEY);
      state = loadState();
      STAGES.forEach(s => {
        if (!state.stages[s.key]) state.stages[s.key] = { date: '', time: '', pending: false, sent: false, extra: {} };
      });
      render();
      showToast('Dados limpos');
    }
  };

  function buildMessagePlain() {
    const lines = [];
    if (state.operMsg && state.operMsg.trim()) {
      lines.push(state.operMsg.trim());
      lines.push('');
    }
    lines.push('Motorista/Funcionário: ' + (state.driverName || '-'));
    lines.push('Placa cavalo: ' + (state.plateCavalo || '-'));
    lines.push('Placa reboque: ' + (state.plateReboque || '-'));
    lines.push('Contêiner: ' + (state.containerNum || '-'));
    lines.push('Referência: ' + (state.refNum || '-'));
    lines.push('');
    STAGES.forEach(stageDef => {
      const st = state.stages[stageDef.key];
      if (st.pending) {
        lines.push(stageDef.label + ': A confirmar');
      } else if (st.time && st.date) {
        lines.push(stageDef.label + ': ' + formatDateBR(st.date) + ' às ' + st.time);
        if (stageDef.extra) {
          stageDef.extra.forEach(ex => {
            if (st.extra[ex.key]) lines.push('  ' + ex.label + ': ' + st.extra[ex.key]);
          });
        }
      }
    });
    return lines.join('\n');
  }

  function buildMessageHTML() {
    const esc = s => (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const style = 'font-family:Arial,sans-serif;font-size:12pt;line-height:1.15;color:#000000;';

    let rows = '';
    rows += `<tr><td style="padding:2px 0"><b>Motorista/Funcionário:</b> ${esc(state.driverName || '-')}</td></tr>`;
    rows += `<tr><td style="padding:2px 0"><b>Placa cavalo:</b> ${esc(state.plateCavalo || '-')}</td></tr>`;
    rows += `<tr><td style="padding:2px 0"><b>Placa reboque:</b> ${esc(state.plateReboque || '-')}</td></tr>`;
    rows += `<tr><td style="padding:2px 0"><b>Contêiner:</b> ${esc(state.containerNum || '-')}</td></tr>`;
    rows += `<tr><td style="padding:2px 0"><b>Referência:</b> ${esc(state.refNum || '-')}</td></tr>`;

    let stageRows = '';
    STAGES.forEach(stageDef => {
      const st = state.stages[stageDef.key];
      if (st.pending) {
        stageRows += `<tr><td style="padding:2px 0"><b>${esc(stageDef.label)}:</b> A confirmar</td></tr>`;
      } else if (st.time && st.date) {
        stageRows += `<tr><td style="padding:2px 0"><b>${esc(stageDef.label)}:</b> ${formatDateBR(st.date)} às ${st.time}</td></tr>`;
        if (stageDef.extra) {
          stageDef.extra.forEach(ex => {
            if (st.extra[ex.key]) {
              stageRows += `<tr><td style="padding:2px 0 2px 16px">${esc(ex.label)}: ${esc(st.extra[ex.key])}</td></tr>`;
            }
          });
        }
      }
    });

    const msgBlock = (state.operMsg && state.operMsg.trim())
      ? `<p style="${style}margin:0 0 14px 0;">${esc(state.operMsg.trim()).replace(/\n/g,'<br>')}</p>`
      : '';

    return `<div style="${style}">
      ${msgBlock}
      <table style="border-collapse:collapse;${style}">
        ${rows}
      </table>
      ${stageRows ? `<br><table style="border-collapse:collapse;${style}">${stageRows}</table>` : ''}
    </div>`;
  }

  function sendUpdate() {
    const useEmail = document.getElementById('useEmail').checked;
    const useWhats = document.getElementById('useWhats').checked;
    const email = state.destEmail.trim();

    if (!useEmail && !useWhats) {
      showToast('Selecione ao menos um canal de envio');
      return;
    }

    if (useEmail && !email) {
      showToast('Preencha o e-mail de destino');
      document.getElementById('destEmail').focus();
      return;
    }

    const subject = `Atualização contêiner ${state.containerNum || ''} — Ref: ${state.refNum || ''}`;

    if (useEmail) {
      const htmlBody = buildMessageHTML();
      const webmailUrl = `https://webmail-seguro.com.br/?_task=mail&_action=compose&_to=${encodeURIComponent(email)}&_subject=${encodeURIComponent(subject)}&_body=${encodeURIComponent(htmlBody)}`;
      window.open(webmailUrl, '_blank');
    }

    if (useWhats) {
      const plainText = buildMessagePlain();
      // whatsapp:// abre o app instalado no computador ou celular
      const waUrl = `whatsapp://send?text=${encodeURIComponent(plainText)}`;
      setTimeout(() => { window.location.href = waUrl; }, useEmail ? 400 : 0);
    }

    STAGES.forEach(s => { state.stages[s.key].sent = true; });
    saveToHistory();
    saveState();
    render();
    showToast('Enviado com sucesso!');
  }

  document.getElementById('btnSendFinal').onclick = sendUpdate;

  render();
</script>

</body>
</html>
